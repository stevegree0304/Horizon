name: Daily Horizon Summary

on:
  schedule:
    - cron: '30 6 * * *'   # 北京时间 早上 06:30 (早报)
    - cron: '30 11 * * *'  # 北京时间 中午 11:30 (午报)
    - cron: '0 21 * * *'   # 北京时间 晚上 21:00 (晚报)
      timezone: 'Asia/Shanghai'
  workflow_dispatch:       # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Run Horizon
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run horizon --hours 48

      - name: Split and Send Full News to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c '
          import os, requests, glob

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]

          # 1. 自动抓取今天生成的中文新闻内容
          files = glob.glob("data/summaries/*-zh.md")
          if not files:
              print("没有找到中文摘要文件！")
              exit(0)
              
          with open(files[0], "r", encoding="utf-8") as f:
              content = f.read()

          # 2. 按照 3500 个字符进行精准拆分
          MAX_LEN = 3500
          chunks = [content[i:i+MAX_LEN] for i in range(0, len(content), MAX_LEN)]

          # 3. 连发循环
          for idx, chunk in enumerate(chunks):
              header = f"📰 <b>今日 AI 聚合新闻 (第 {idx+1}/{len(chunks)} 页)</b>\n\n"
              payload = {
                  "chat_id": chat_id,
                  "text": header + chunk,
                  "parse_mode": "Markdown"
              }
              res = requests.post(f"https://api.telegram.org/bot{token}/sendMessage", json=payload)
              if res.status_code != 200:
                  payload["parse_mode"] = ""
                  requests.post(f"https://api.telegram.org/bot{token}/sendMessage", json=payload)
          print(f"成功将新闻拆分为 {len(chunks)} 条消息发送完毕！")
          '
