name: Daily Horizon Summary

on:
  schedule:
    - cron: '30 22 * * *'
    - cron: '30 3 * * *'
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Install pip packages
        run: pip install requests

      - name: Run Horizon
        env:
          OPENAI_API_KEY: *** secrets.OPENAI_API_KEY }}
        run: uv run horizon --hours 12

      - name: Send Report to Telegram
        env:
          TELEGRAM_BOT_TOKEN: *** secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -c "exec(__import__('base64').b64decode('').decode())"

      - name: Commit generated summaries
        run: |
          git config --global user.name "Horizon Bot"
          git config --global user.email "horizon-bot@users.noreply.github.com"
          git add data/summaries/ docs/_posts/
          git diff --staged --quiet || git commit -m "Daily Horizon summary"; git push
