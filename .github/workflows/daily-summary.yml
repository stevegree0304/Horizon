name: Daily Horizon Summary

on:
  schedule:
    - cron: '30 6 * * *'
    - cron: '30 11 * * *'
    - cron: '0 21 * * *'
      timezone: 'Asia/Shanghai'
  workflow_dispatch:

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Run Horizon
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run horizon --hours 48

      - name: Split and Send Full News to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c '
          import os, requests, glob

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]

          files = glob.glob("data/summaries/*-zh.md")
          if not files:
              print("娌℃湁鎵惧埌涓枃鎽樿鏂囦欢锛?)
              exit(0)

          with open(files[0], "r", encoding="utf-8") as f:
              content = f.read()

          MAX_LEN = 3500
          chunks = [content[i:i+MAX_LEN] for i in range(0, len(content), MAX_LEN)]

          for idx, chunk in enumerate(chunks):
              header = f"馃摪 <b>浠婃棩 AI 鑱氬悎鏂伴椈 (绗?{idx+1}/{len(chunks)} 椤?</b>\n\n"
              payload = {
                  "chat_id": chat_id,
                  "text": header + chunk,
                  "parse_mode": "HTML"
              }
              res = requests.post(f"https://api.telegram.org/bot{token}/sendMessage", json=payload)
              if res.status_code != 200:
                  payload["parse_mode"] = ""
                  requests.post(f"https://api.telegram.org/bot{token}/sendMessage", json=payload)
          print(f"鉁?鎴愬姛灏嗘柊闂绘媶鍒嗕负 {len(chunks)} 鏉℃秷鎭彂閫佸畬姣曪紒")
          '

      - name: Commit generated summaries
        run: |
          git config --global user.name "Horizon Bot"
          git config --global user.email "horizon-bot@users.noreply.github.com"
          git add data/summaries/ docs/_posts/
          git diff --staged --quiet || git commit -m "馃摪 Daily Horizon summary $(date +'%Y-%m-%d %H:%M')"
          git push
